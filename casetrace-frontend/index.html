<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaseTrace - Official Government Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="gov-header">
        <div class="header-container">
            <div class="logo-section">
                <!-- Using a generic emblem placeholder -->
                <div class="emblem-placeholder">🏛️</div>
                <div>
                    <h1>CaseTrace</h1>
                    <p class="subtitle">National Crime & Case Tracking Network</p>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="auth-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTheme('citizen')">Citizen Portal</button>
                <button class="tab-btn" onclick="switchTheme('officer')">Officer Portal</button>
            </div>

            <!-- Citizen Login Section -->
            <div id="citizen-section" class="form-section active">
                <h2>Citizen Services</h2>
                <p>Register complaints, upload evidence, and track status.</p>
                
                <form id="citizen-login-form" class="auth-form" onsubmit="handleCitizenLogin(event)">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="citizen-email" required placeholder="name@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="citizen-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary">Secure Login</button>
                </form>

                <div class="divider"><span>OR</span></div>

                <form id="citizen-register-form" class="auth-form" onsubmit="handleCitizenRegister(event)">
                    <h3>New Citizen Registration</h3>
                    <div class="form-group">
                        <label>Full Legal Name</label>
                        <input type="text" id="reg-name" required placeholder="As per official documents">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="reg-email" required placeholder="For official communications">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="reg-phone" required placeholder="10-digit mobile number">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-password" required placeholder="Create a strong password">
                    </div>
                    <button type="submit" class="btn btn-secondary">Register Account</button>
                </form>
            </div>

            <!-- Officer Login Section -->
            <div id="officer-section" class="form-section" style="display: none;">
                <h2>Department Access</h2>
                <p>Authorized personnel login for case management.</p>
                
                <form id="officer-login-form" class="auth-form" onsubmit="handleOfficerLogin(event)">
                    <div class="form-group">
                        <label>Official Email</label>
                        <input type="email" id="officer-email" required placeholder="badge_number@police.gov">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="officer-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary officer-btn">Access Dashboard</button>
                </form>
            </div>
            
            <div id="api-message" class="message-box"></div>
        </div>
    </main>

    <footer class="gov-footer">
        <p>&copy; 2026 CaseTrace. A Government Initiative.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
